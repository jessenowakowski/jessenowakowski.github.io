    <h1>Cube Notation Explained</h1>
    <h2>Common notation</h2>
    <ul>
        <li>U: Up (clockwise)</li>
        <li>D: Down (clockwise)</li>
        <li>F: Front (clockwise)</li>
        <li>B: Back (clockwise)</li>
        <li>R: Right (clockwise)</li>
        <li>L: Left (clockwise)</li>
    </ul>
    <h2>Suffixes</h2>
    <ul>
        <li>' = counterclockwise</li>
        <li>2 = 180° turn</li>
    </ul>
